<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDT Cybersecurity - Viettel Digital Talent Security</title>
    <meta name="description"
        content="Nền tảng ôn tập kiến thức An Toàn Thông Tin dành cho ứng viên Viettel Digital Talent.">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app" class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <div class="brand-logo">
                    <span class="glitch" data-text="VDT">VDT</span>
                </div>
                <h2>Cybersecurity</h2>
            </div>
            <ul class="nav-links">
                <li class="nav-item active" data-target="dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </li>
                <li class="nav-item" data-target="knowledge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span>Kiến thức (Học)</span>
                </li>
                <li class="nav-item" data-target="quiz">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <span>Thi thử (Quiz)</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="user-status">
                    <span class="status-dot"></span>
                    <span>System Online - Ready for VDT 2026</span>
                </div>
                <div class="user-stats">
                    <div class="stat-badge">
                        <span>Score: <strong id="total-score">0</strong></span>
                    </div>
                </div>
            </header>

            <div id="content-area" class="content-wrapper">
                <!-- Content injected dynamically via JS -->
            </div>
        </main>
    </div>

    <!-- Modal for Quiz Results -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Kết quả</h2>
            <div id="modal-body" class="modal-body"></div>
            <button id="modal-close" class="btn btn-primary">Đóng</button>
        </div>
    </div>

    <!-- Quiz Data Sources -->
    <script src="data_1_web.js"></script>
    <script src="data_2_re.js"></script>
    <script src="data_3_os.js"></script>
    <script src="data_4_net.js"></script>
    <script src="data_5_soc.js"></script>
    <script src="data_6_cloud.js"></script>
    <script src="data_7_grc.js"></script>
    <script src="data_8_malware.js"></script>
    <script src="data_9_auto.js"></script>

    <!-- Main JS Applications -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
